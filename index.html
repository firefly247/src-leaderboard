<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="실내 조정 에르고 기록 리더보드">
  <title>실내 조정 에르고 기록 리더보드</title>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./" aria-label="리더보드 홈">
      <span class="brand-mark">◫</span>
      <span>삼성조정클럽 ERG 기록</span>
    </a>
    <nav>
      <button id="refreshButton" class="refresh-button" type="button" aria-label="Google Sheets 기록 새로고침">
        <span aria-hidden="true">↻</span> 새로고침
      </button>
    </nav>
  </header>

  <main class="page-shell">
    
    <div id="statusMessage" class="status-message" role="status">Google Spreadsheet에서 기록을 불러오는 중입니다.</div>

    <section class="hero">
      <div>
        <h1>명예의 전당</h1>
        <p>거리별 개인 최고기록(PB) 자동 집계</p>
      </div>
      <div class="hero-stats">
        <div><strong id="memberCount">-</strong><span>회원</span></div>
        <div><strong id="recordCount">-</strong><span>전체 기록</span></div>
        <a class="source-stat" href="https://docs.google.com/spreadsheets/d/1qF0k-jsI9gqmMvA_IjT03duBjukT56PbjVQv6PsAcm0/edit?gid=90249257"
          target="_blank" rel="noopener noreferrer" aria-label="Google Sheets 데이터 원본 열기">
          <strong>Google Sheets</strong><span>데이터 원본 ↗</span>
        </a>
      </div>
    </section>
    <section id="topChampions" class="top-champions" aria-label="종목별 1위">
      <article class="top-champion-card"><span>500M TOP 1</span><strong>-</strong><small>-</small></article>
      <article class="top-champion-card"><span>1000M TOP 1</span><strong>-</strong><small>-</small></article>
      <article class="top-champion-card"><span>2000M TOP 1</span><strong>-</strong><small>-</small></article>
    </section>
    <div id="eventSections" class="event-sections" aria-label="거리별 순위"></div>

    <section class="panel">
      <div class="section-heading table-heading">
        <div><p class="eyebrow">MEMBERS</p><h2>회원별 PB</h2></div>
        <input id="memberSearch" class="search-input" type="search" placeholder="회원 검색" aria-label="회원 검색">
      </div>
      <div class="table-wrap">
        <table id="memberTable">
          <thead><tr><th>#</th><th>이름</th><th>500M PB</th><th>1000M PB</th><th>2000M PB</th><th>등록 기록</th><th>상세</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="memberDialog" class="member-dialog" aria-labelledby="dialogMemberName">
    <div class="dialog-header">
      <div><p class="eyebrow">MEMBER RECORDS</p><h2 id="dialogMemberName"></h2></div>
      <button id="dialogCloseButton" class="dialog-close" type="button" aria-label="팝업 닫기">×</button>
    </div>
    <div id="dialogContent"></div>
  </dialog>

  <footer>© <span id="currentYear"></span> Indoor Rowing Erg Leaderboard</footer>
  <script src="./static/leaderboard.js" defer></script>
</body>
</html>
