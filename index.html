<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="실내 조정 에르고 기록 리더보드">
  <title>실내 조정 에르고 기록 리더보드</title>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./" aria-label="리더보드 홈">
      <span class="brand-mark">◫</span>
      <span>INDOOR ROWING ERG</span>
    </a>
    <nav><a href="./">리더보드</a></nav>
  </header>

  <main class="page-shell">
    <div id="statusMessage" class="status-message" role="status">Google Spreadsheet에서 기록을 불러오는 중입니다.</div>

    <section class="hero">
      <div>
        <p class="eyebrow">INDOOR ROWING RECORDS</p>
        <h1>명예의 전당</h1>
        <p>실내 조정 에르고 대회 기록에서 거리별 개인 최고기록(PB)을 자동 집계합니다.</p>
      </div>
      <div class="hero-stats">
        <div><strong id="memberCount">-</strong><span>회원</span></div>
        <div><strong id="recordCount">-</strong><span>전체 기록</span></div>
        <div><strong>Google Sheets</strong><span>데이터 원본</span></div>
      </div>
    </section>

    <div id="eventSections" class="event-sections" aria-label="거리별 순위"></div>

    <section class="panel">
      <div class="section-heading table-heading">
        <div><p class="eyebrow">MEMBERS</p><h2>회원별 개인 최고기록</h2></div>
        <input id="memberSearch" class="search-input" type="search" placeholder="회원 검색" aria-label="회원 검색">
      </div>
      <div class="table-wrap">
        <table id="memberTable">
          <thead><tr><th>#</th><th>이름</th><th>500M PB</th><th>1000M PB</th><th>2000M PB</th><th>등록 기록</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>© <span id="currentYear"></span> Indoor Rowing Erg Leaderboard</footer>
  <script src="./static/leaderboard.js" defer></script>
</body>
</html>
