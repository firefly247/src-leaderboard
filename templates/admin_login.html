{% extends "base.html" %}
{% block title %}관리자 로그인{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">ADMIN ACCESS</p>
  <h1>관리자 로그인</h1>
  <p>기록 입력·삭제·CSV 업로드는 관리자만 사용할 수 있습니다.</p>
  <form method="post" class="stack-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>관리자 비밀번호<input type="password" name="password" required autofocus autocomplete="current-password"></label>
    <button class="primary-button" type="submit">로그인</button>
  </form>
</section>
{% endblock %}
